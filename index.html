<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Buku Kas Angkot Pro</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#212529">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background-color: #f4f6f8; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            padding-bottom: 80px;
            -webkit-user-select: none;
        }
        
        input, select, textarea, .allow-select { -webkit-user-select: text; user-select: text; }
        .card { border-radius: 16px; border: none; box-shadow: 0 4px 16px rgba(0,0,0,0.04); }
        
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0; height: 65px;
            background-color: #ffffff; box-shadow: 0 -3px 12px rgba(0,0,0,0.08);
            z-index: 1030; display: flex; justify-content: space-around; align-items: center;
            padding-bottom: env(safe-area-inset-bottom);
        }
        
        .nav-item-btn {
            background: none; border: none; color: #8a8f94; font-size: 12px; font-weight: 600;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            width: 50%; height: 100%; transition: all 0.2s ease;
            position: relative; border-top: 3px solid transparent;
        }
        
        .nav-item-btn.active { 
            color: #212529; 
            background-color: #f8f9fa;
            border-top: 3px solid #212529;
        }
        .nav-item-btn .nav-icon { font-size: 20px; margin-bottom: 2px; }

        .btn-check:checked + .btn-outline-success {
            background-color: #2ecc71 !important; color: white !important; border-color: #2ecc71 !important;
        }
        .btn-check:checked + .btn-outline-danger {
            background-color: #e74c3c !important; color: white !important; border-color: #e74c3c !important;
        }
        .btn-check:checked + .btn-outline-dark {
            background-color: #212529 !important; color: white !important; border-color: #212529 !important;
        }

        .log-item {
            background: #ffffff; border-radius: 14px; padding: 14px; margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03); border-left: 6px solid #ccc;
            display: flex; justify-content: space-between; align-items: center;
        }
        .log-item.masuk { border-left-color: #2ecc71; background-color: #f4fbf7; }
        .log-item.keluar { border-left-color: #e74c3c; background-color: #fdf5f5; }
        .log-item.tidak-jalan { border-left-color: #f39c12; background-color: #fffaf0; }
        
        .btn:active, .log-item:active { opacity: 0.85; }

        .card-masuk { background-color: #2ecc71; color: white; }
        .card-keluar { background-color: #e74c3c; color: white; }
        .card-laba-plus { background-color: #3498db; color: white; }
        .card-laba-minus { background-color: #f39c12; color: white; }
    </style>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

<div class="bg-dark text-white py-3 px-3 sticky-top shadow-sm d-flex justify-content-between align-items-center">
    <h5 class="mb-0 fw-bold">🚖 Buku Kas Angkot Pro</h5>
    <div>
        <span class="badge bg-secondary me-1" id="badgeAkses">Mengecek Akses...</span>
        <span class="badge bg-success" id="statusKoneksi">🌐 Online</span>
    </div>
</div>

<div class="container py-3" style="max-width: 600px;">

    <div id="page-entry" class="app-page">
        <div class="card p-4 mb-3">
            <h5 class="fw-bold text-secondary mb-4">📝 Tambah Catatan Baru</h5>
            
            <div id="notifSukses" class="alert alert-success d-none text-center fw-bold rounded-3" role="alert">
                ✅ Berhasil Disimpan & Sinkron!
            </div>

            <form id="formTransaksi">
                
                <div class="mb-3">
                    <label id="labelTanggal" class="form-label fw-bold text-muted small mb-2">
                        Tanggal Transaksi <span id="infoHariIni" class="text-success fw-bold ms-1">(Hari Ini)</span>
                    </label>
                    <div class="d-flex gap-2">
                        <button type="button" class="btn btn-dark fw-bold shadow-sm" style="width: 55px; font-size: 18px;" onclick="ubahHari(-1)">−</button>
                        <input type="date" class="form-control text-center fw-bold" id="tanggal" required onchange="cekStatusHariIni()">
                        <button type="button" class="btn btn-dark fw-bold shadow-sm" style="width: 55px; font-size: 18px;" onclick="ubahHari(1)">+</button>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold text-muted small d-block mb-2">Jenis Catatan Keuangan:</label>
                    <div class="btn-group w-100" role="group">
                        <input type="radio" class="btn-check" name="jenis" id="jenis_masuk" value="masuk" checked autocomplete="off">
                        <label class="btn btn-outline-success fw-bold py-3 text-center" for="jenis_masuk" style="border-radius: 12px 0 0 12px;">
                            💰 SETORAN MASUK
                        </label>

                        <input type="radio" class="btn-check" name="jenis" id="jenis_keluar" value="keluar" autocomplete="off">
                        <label class="btn btn-outline-danger fw-bold py-3 text-center" for="jenis_keluar" style="border-radius: 0 12px 12px 0;">
                            💸 UANG KELUAR
                        </label>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold text-muted small d-block mb-2">Pilih Armada Angkot</label>
                    <div class="btn-group w-100" role="group">
                        <input type="radio" class="btn-check" name="angkot" id="angkot_01" value="Pahlevi 1" checked autocomplete="off">
                        <label class="btn btn-outline-dark fw-bold py-2" for="angkot_01" style="border-radius: 10px 0 0 10px;">🚌 Pahlevi 1</label>

                        <input type="radio" class="btn-check" name="angkot" id="angkot_02" value="Pahlevi 2" autocomplete="off">
                        <label class="btn btn-outline-dark fw-bold py-2" for="angkot_02">🚌 Pahlevi 2</label>

                        <input type="radio" class="btn-check" name="angkot" id="angkot_03" value="Pahlevi 3" autocomplete="off">
                        <label class="btn btn-outline-dark fw-bold py-2" for="angkot_03" style="border-radius: 0 10px 10px 0;">🚌 Pahlevi 3</label>
                    </div>
                </div>
                
                <div id="boxNominal" class="p-3 rounded-3 mb-3" style="transition: all 0.3s ease;">
                    <label for="nominalTampilan" id="labelNominal" class="form-label fw-bold small">Nominal Uang (Rp)</label>
                    <input type="text" inputmode="numeric" class="form-control form-control-lg fw-bold fs-1 border-0 bg-transparent p-0" id="nominalTampilan" placeholder="0" required style="box-shadow: none;">
                    <input type="hidden" id="nominalAsli">
                </div>

                <div class="mb-3">
                    <label for="keteranganPilihan" class="form-label fw-semibold text-muted small">Keterangan / Kategori Utama</label>
                    <select class="form-select fw-bold py-2" id="keteranganPilihan" onchange="validasiAturanCatatan()" required>
                    </select>
                </div>

                <div class="mb-4 d-none" id="boxKeteranganManual">
                    <label for="keteranganManual" id="labelKeteranganManual" class="form-label fw-semibold text-muted small">Catatan Tambahan Bebas</label>
                    <input type="text" class="form-control" id="keteranganManual" placeholder="">
                </div>

                <button type="submit" id="btnSimpan" class="btn w-100 fw-bold btn-touch shadow">💾 Simpan Transaksi</button>
            </form>
        </div>
    </div>

    <div id="page-log" class="app-page d-none">
        <div class="card p-3 mb-3 bg-white">
            <div class="row g-2">
                <div class="col-6">
                    <label class="small fw-bold text-muted mb-1">Periode Bulan</label>
                    <input type="month" id="filterBulan" class="form-control" onchange="perbaruiTampilan()">
                </div>
                <div class="col-6">
                    <label class="small fw-bold text-muted mb-1">Pilih Armada</label>
                    <select id="filterAngkot" class="form-select" onchange="perbaruiTampilan()">
                        <option value="semua">Semua Angkot</option>
                        <option value="Pahlevi 1">Pahlevi 1</option>
                        <option value="Pahlevi 2">Pahlevi 2</option>
                        <option value="Pahlevi 3">Pahlevi 3</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="row g-2 mb-4">
            <div class="col-6">
                <div class="card card-masuk p-3 text-center">
                    <small class="opacity-75 d-block" style="font-size: 11px;">🟢 Total Setoran</small>
                    <span id="totalMasuk" class="fw-bold fs-6">Rp 0</span>
                </div>
            </div>
            <div class="col-6">
                <div class="card card-keluar p-3 text-center">
                    <small class="opacity-75 d-block" style="font-size: 11px;">🔴 Total Uang Keluar</small>
                    <span id="totalKeluar" class="fw-bold fs-6">Rp 0</span>
                </div>
            </div>
            <div class="col-12">
                <div id="boxLaba" class="card card-laba-plus p-3 text-center shadow-sm">
                    <small id="judulLaba" class="opacity-75 d-block fw-bold">💵 LABA BERSIH (SISA KAS)</small>
                    <span id="totalBersih" class="fw-bold fs-4">Rp 0</span>
                </div>
            </div>
        </div>

        <h6 class="fw-bold text-secondary mb-2 px-1">Riwayat Catatan Transaksi (Real-time)</h6>
        <div id="logMobileContainer"></div>
    </div>

</div>

<div class="bottom-nav">
    <button class="nav-item-btn active" id="btn-nav-entry" onclick="bukaHalaman('entry')">
        <span class="nav-icon">📝</span>
        <span>Input Data</span>
    </button>
    <button class="nav-item-btn" id="btn-nav-log" onclick="bukaHalaman('log')">
        <span class="nav-icon">📊</span>
        <span>Lihat Laporan</span>
    </button>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // --- DATA CONFIG FIREBASE ANDA ---
    const firebaseConfig = {
        apiKey: "AIzaSyCIR_F_sShdVBzMFiDPYq9ocLOjrZx2QYo",
        authDomain: "kas-angkot-online.firebaseapp.com",
        databaseURL: "https://kas-angkot-online-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "kas-angkot-online",
        storageBucket: "kas-angkot-online.firebasestorage.app",
        messagingSenderId: "46164187145",
        appId: "1:46164187145:web:4c3d0693e7f19427c040d8"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('transaksi_angkot');

    let dataTransaksiGlobal = [];
    let isAdmin = false;

    function cekHakAkses() {
        const urlParams = new URLSearchParams(window.location.search);
        const mode = urlParams.get('mode');
        const badge = document.getElementById('badgeAkses');
        
        if (mode === 'admin') {
            isAdmin = true;
            badge.className = "badge bg-danger me-1";
            badge.innerText = "👑 Admin";
        } else {
            isAdmin = false;
            badge.className = "badge bg-primary me-1";
            badge.innerText = "👨‍✈️ Operator";
        }
    }

    function dapatkanTanggalHariIni() {
        const tgl = new Date();
        const offset = tgl.getTimezoneOffset();
        const localTgl = new Date(tgl.getTime() - (offset * 60 * 1000));
        return localTgl.toISOString().split('T')[0];
    }

    function setTanggalKeHariIni() {
        const tglString = dapatkanTanggalHariIni();
        document.getElementById('tanggal').value = tglString;
        cekStatusHariIni();
    }

    function cekStatusHariIni() {
        const inputTanggal = document.getElementById('tanggal').value;
        const infoHariIni = document.getElementById('infoHariIni');
        if (inputTanggal === dapatkanTanggalHariIni()) {
            infoHariIni.style.display = "inline";
        } else {
            infoHariIni.style.display = "none";
        }
    }

    function ubahHari(jumlahHari) {
        const inputTanggal = document.getElementById('tanggal');
        let tanggalSkg = new Date(inputTanggal.value);
        if (isNaN(tanggalSkg.getTime())) tanggalSkg = new Date();
        tanggalSkg.setDate(tanggalSkg.getDate() + jumlahHari);
        inputTanggal.value = tanggalSkg.toISOString().split('T')[0];
        cekStatusHariIni();
    }

    cekHakAkses();
    setTanggalKeHariIni();
    document.getElementById('filterBulan').value = dapatkanTanggalHariIni().substring(0, 7);

    const inputTampilan = document.getElementById('nominalTampilan');
    const inputAsli = document.getElementById('nominalAsli');
    const selectKeterangan = document.getElementById('keteranganPilihan');
    const inputManual = document.getElementById('keteranganManual');
    const boxKeteranganManual = document.getElementById('boxKeteranganManual');
    const labelKeteranganManual = document.getElementById('labelKeteranganManual');

    function sesuaikanWarnaDanContoh() {
        const jenisTerpilih = document.querySelector('input[name="jenis"]:checked').value;
        const boxNominal = document.getElementById('boxNominal');
        const labelNominal = document.getElementById('labelNominal');
        const btnSimpan = document.getElementById('btnSimpan');

        selectKeterangan.innerHTML = '';

        if (jenisTerpilih === 'masuk') {
            boxNominal.style.backgroundColor = '#e8f8f5';
            boxNominal.style.border = '2px solid #2ecc71';
            labelNominal.className = "form-label fw-bold small text-success";
            labelNominal.innerText = "🟢 NOMINAL SETORAN MASUK (Rp)";
            inputTampilan.className = "form-control form-control-lg fw-bold fs-1 border-0 bg-transparent p-0 text-success";
            inputTampilan.readOnly = false;
            btnSimpan.className = "btn btn-success w-100 fw-bold btn-touch shadow";
            
            const opsiMasuk = [
                "Setoran Full",
                "Setoran Kurang",
                "Angkot Tidak Jalan"
            ];
            opsiMasuk.forEach(opsi => {
                selectKeterangan.innerHTML += `<option value="${opsi}">${opsi}</option>`;
            });

        } else {
            boxNominal.style.backgroundColor = '#fdedec';
            boxNominal.style.border = '2px solid #e74c3c';
            labelNominal.className = "form-label fw-bold small text-danger";
            labelNominal.innerText = "🔴 NOMINAL UANG KELUAR (Rp)";
            inputTampilan.className = "form-control form-control-lg fw-bold fs-1 border-0 bg-transparent p-0 text-danger";
            inputTampilan.readOnly = false;
            btnSimpan.className = "btn btn-danger w-100 fw-bold btn-touch shadow";
            
            const opsiKeluar = [
                "Ganti Oli (Wajib Bulanan)",
                "Servis Rutin / Perbaikan",
                "Lain-lain / Keperluan Bebas"
            ];
            opsiKeluar.forEach(opsi => {
                selectKeterangan.innerHTML += `<option value="${opsi}">${opsi}</option>`;
            });
        }
        validasiAturanCatatan();
    }

    // UPDATE: PERBAIKAN LOGIKA DINAMIS OTOMATISASI NOMINAL & CATATAN
    function validasiAturanCatatan() {
        const jenisTerpilih = document.querySelector('input[name="jenis"]:checked').value;
        const kategoriUtama = selectKeterangan.value;
        const boxNominal = document.getElementById('boxNominal');

        if (jenisTerpilih === 'masuk') {
            if (kategoriUtama === 'Setoran Full') {
                // BARU: Otomatis isi 130.000, ubah tampilan berformat, kunci input
                inputAsli.value = '130000';
                inputTampilan.value = parseInt('130000').toLocaleString('id-ID');
                inputTampilan.readOnly = true;
                
                boxNominal.style.backgroundColor = '#e8f8f5';
                boxNominal.style.border = '2px solid #2ecc71';
                document.getElementById('labelNominal').className = "form-label fw-bold small text-success";
                inputTampilan.className = "form-control form-control-lg fw-bold fs-1 border-0 bg-transparent p-0 text-success";

                // Sembunyikan catatan tambahan karena setoran sudah full
                boxKeteranganManual.classList.add('d-none');
                inputManual.placeholder = "";
                inputManual.required = false;
                inputManual.value = "";

            } else if (kategoriUtama === 'Angkot Tidak Jalan') {
                // Otomatis isi nominal 0 dan kunci input
                inputTampilan.value = '0';
                inputAsli.value = '0';
                inputTampilan.readOnly = true;
                boxNominal.style.backgroundColor = '#fef9e7';
                boxNominal.style.border = '2px solid #f39c12';
                document.getElementById('labelNominal').className = "form-label fw-bold small text-warning";
                inputTampilan.className = "form-control form-control-lg fw-bold fs-1 border-0 bg-transparent p-0 text-warning";

                // Memunculkan kotak Catatan Tambahan (Wajib Isi)
                boxKeteranganManual.classList.remove('d-none');
                labelKeteranganManual.innerHTML = 'Alasan Angkot Tidak Jalan <span class="text-danger fw-bold">*Wajib Diisi</span>';
                inputManual.placeholder = "Tulis alasan di sini (misal: supir sakit, masuk bengkel)";
                inputManual.required = true;

            } else if (kategoriUtama === 'Setoran Kurang') {
                // Buka input nominal agar operator bisa mengetik nominal setoran yang kurang
                inputTampilan.readOnly = false;
                // Bersihkan angka jika sebelumnya bekas terisi otomatis oleh kategori lain
                if(inputAsli.value === '0' || inputAsli.value === '130000') { inputTampilan.value = ''; inputAsli.value = ''; }
                
                boxNominal.style.backgroundColor = '#e8f8f5';
                boxNominal.style.border = '2px solid #2ecc71';
                document.getElementById('labelNominal').className = "form-label fw-bold small text-success";
                inputTampilan.className = "form-control form-control-lg fw-bold fs-1 border-0 bg-transparent p-0 text-success";

                // Memunculkan kotak Catatan Tambahan (Wajib Isi)
                boxKeteranganManual.classList.remove('d-none');
                labelKeteranganManual.innerHTML = 'Alasan Setoran Kurang <span class="text-danger fw-bold">*Wajib Diisi</span>';
                inputManual.placeholder = "Tulis alasan di sini (misal: sepi, ban bocor)";
                inputManual.required = true;
            }
        } else {
            // Uang Keluar (Selalu memunculkan catatan tambahan untuk detail belanja)
            inputTampilan.readOnly = false;
            if(inputAsli.value === '0' || inputAsli.value === '130000') { inputTampilan.value = ''; inputAsli.value = ''; }
            
            boxNominal.style.backgroundColor = '#fdedec';
            boxNominal.style.border = '2px solid #e74c3c';
            
            boxKeteranganManual.classList.remove('d-none');
            labelKeteranganManual.innerHTML = 'Detail Pengeluaran <span class="text-danger fw-bold">*Wajib Diisi</span>';
            inputManual.placeholder = "Misal: Nama toko sparepart, ganti oli merk apa, dll";
            inputManual.required = true;
        }
    }

    document.querySelectorAll('input[name="jenis"]').forEach(radio => {
        radio.addEventListener('change', sesuaikanWarnaDanContoh);
    });

    inputTampilan.addEventListener('input', function(e) {
        if(this.readOnly) return;
        let angka = this.value.replace(/\D/g, '');
        if (angka) {
            inputAsli.value = angka;
            this.value = parseInt(angka).toLocaleString('id-ID');
        } else {
            inputAsli.value = '';
            this.value = '';
        }
    });

    function formatRupiah(angka) {
        return 'Rp ' + parseInt(angka).toLocaleString('id-ID');
    }

    function bukaHalaman(namaHalaman) {
        document.querySelectorAll('.app-page').forEach(page => page.classList.add('d-none'));
        document.querySelectorAll('.nav-item-btn').forEach(btn => btn.classList.remove('active'));

        if(namaHalaman === 'entry') {
            document.getElementById('page-entry').classList.remove('d-none');
            document.getElementById('btn-nav-entry').classList.add('active');
        } else if(namaHalaman === 'log') {
            document.getElementById('page-log').classList.remove('d-none');
            document.getElementById('btn-nav-log').classList.add('active');
            perbaruiTampilan(); 
        }
    }

    db.on('value', function(snapshot) {
        dataTransaksiGlobal = [];
        snapshot.forEach(function(childSnapshot) {
            let item = childSnapshot.val();
            item.id_firebase = childSnapshot.key;
            dataTransaksiGlobal.push(item);
        });
        perbaruiTampilan();
    }, function(error) {
        document.getElementById('statusKoneksi').className = "badge bg-danger";
        document.getElementById('statusKoneksi').innerText = "❌ Gangguan Koneksi";
    });

    function perbaruiTampilan() {
        const container = document.getElementById('logMobileContainer');
        if(!container) return;
        
        const bulanTerpilih = document.getElementById('filterBulan').value; 
        const filterAngkot = document.getElementById('filterAngkot').value;
        container.innerHTML = '';
        
        let totalMasuk = 0;
        let totalKeluar = 0;

        dataTransaksiGlobal.sort((a, b) => new Date(b.tanggal) - new Date(a.tanggal));
        let adaData = false;

        dataTransaksiGlobal.forEach((item) => {
            const cocokBulan = item.tanggal.substring(0, 7) === bulanTerpilih;
            const angkotItem = item.angkot || 'Pahlevi 1'; 
            const cocokAngkot = filterAngkot === 'semua' || angkotItem === filterAngkot;

            if (cocokBulan && cocokAngkot) {
                adaData = true;
                let nominalBersih = parseInt(item.nominal.toString().replace(/\D/g, '')) || 0;

                if (item.jenis === 'masuk') totalMasuk += nominalBersih;
                if (item.jenis === 'keluar') totalKeluar += nominalBersih;

                const opsiTanggal = { month: 'short', day: 'numeric' };
                const tglIndo = new Date(item.tanggal).toLocaleDateString('id-ID', opsiTanggal);
                
                let kelasJenis = item.jenis === 'masuk' ? 'masuk' : 'keluar';
                if (item.keterangan.includes("Angkot Tidak Jalan")) {
                    kelasJenis = 'tidak-jalan';
                }
                
                const warnaNominal = item.jenis === 'masuk' ? (nominalBersih === 0 ? 'text-warning' : 'text-success') : 'text-danger';
                const tanda = item.jenis === 'masuk' ? '💰 +' : '💸 -';

                const tombolHapusHtml = isAdmin 
                    ? `<button class="btn btn-link p-2 text-danger border-0" onclick="hapusData('${item.id_firebase}')" style="font-size: 16px; text-decoration:none;">❌</button>` 
                    : ``;

                container.innerHTML += `
                    <div class="log-item ${kelasJenis}">
                        <div style="max-width: 65%;">
                            <div class="d-flex align-items-center gap-2 mb-1">
                                <span class="badge bg-dark" style="font-size: 10px;">${angkotItem}</span>
                                <small class="text-muted fw-bold">${tglIndo}</small>
                            </div>
                            <span class="fw-bold text-dark allow-select d-block" style="font-size: 14px; line-height: 1.2;">
                                ${item.keterangan}
                            </span>
                        </div>
                        <div class="text-end d-flex align-items-center gap-2">
                            <span class="fw-bold ${warnaNominal}" style="font-size: 14px;">${tanda}${nominalBersih.toLocaleString('id-ID')}</span>
                            ${tombolHapusHtml}
                        </div>
                    </div>
                `;
            }
        });

        if (!adaData) {
            container.innerHTML = `<div class="text-center text-muted py-5">Belum ada transaksi di periode ini.</div>`;
        }

        let totalBersih = totalMasuk - totalKeluar;
        document.getElementById('totalMasuk').innerText = formatRupiah(totalMasuk);
        document.getElementById('totalKeluar').innerText = formatRupiah(totalKeluar);
        document.getElementById('totalBersih').innerText = formatRupiah(Math.abs(totalBersih)); 
        
        const boxLaba = document.getElementById('boxLaba');
        const judulLaba = document.getElementById('judulLaba');
        
        if (totalBersih < 0) {
            boxLaba.className = "card card-laba-minus p-3 text-center shadow-sm text-white";
            judulLaba.innerText = "⚠️ KAS MINUS (RUGI)";
        } else {
            boxLaba.className = "card card-laba-plus p-3 text-center shadow-sm text-white";
            judulLaba.innerText = "💵 LABA BERSIH (SISA KAS)";
        }
    }

    document.getElementById('formTransaksi').addEventListener('submit', function(e) {
        e.preventDefault();

        const tanggal = document.getElementById('tanggal').value;
        const jenis = document.querySelector('input[name="jenis"]:checked').value;
        const nominal = inputAsli.value; 
        const angkot = document.querySelector('input[name="angkot"]:checked').value;
        
        let keteranganUtama = selectKeterangan.value;
        let catatanTambahan = inputManual.value.trim();
        
        let keteranganFinal = keteranganUtama;
        if (catatanTambahan !== "") {
            keteranganFinal = `${keteranganUtama} (${catatanTambahan})`;
        }

        if(nominal === '' || !angkot) return;

        if (jenis === 'masuk') {
            const sudahAdaSetoran = dataTransaksiGlobal.some(item => item.tanggal === tanggal && item.angkot === angkot && item.jenis === 'masuk');
            
            if (sudahAdaSetoran) {
                alert(`⚠️ GAGAL INPUT!\n${angkot} sudah memiliki catatan status (Setoran/Libur) pada tanggal ${tanggal}.`);
                if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
                return;
            }
        }

        db.push({
            tanggal: tanggal,
            angkot: angkot,
            jenis: jenis,
            nominal: nominal,
            keterangan: keteranganFinal
        }).then(() => {
            if (navigator.vibrate) navigator.vibrate(40);
            
            inputTampilan.value = '';
            inputAsli.value = '';
            inputManual.value = '';

            setTanggalKeHariIni();
            sesuaikanWarnaDanContoh();

            const notif = document.getElementById('notifSukses');
            notif.classList.remove('d-none');
            setTimeout(() => { notif.classList.add('d-none'); }, 1500);
        }).catch(() => {
            alert("Gagal sinkronisasi data online!");
        });
    });

    function hapusData(idFirebase) {
        if(!isAdmin) return;
        if(confirm("Hapus catatan transaksi ini secara permanen dari server?")) {
            firebase.database().ref('transaksi_angkot/' + idFirebase).remove()
            .then(() => {
                if (navigator.vibrate) navigator.vibrate(60);
            }).catch(() => {
                alert("Gagal menghapus data.");
            });
        }
    }

    sesuaikanWarnaDanContoh();
</script>
</body>
</html>
